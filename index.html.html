<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業內部 AI 助理 - 概念展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #7494C0; font-family: "Microsoft JhengHei", sans-serif; }
        .msg-ai { background-color: white; border-radius: 2px 18px 18px 18px; position: relative; }
        .msg-user { background-color: #85E249; border-radius: 18px 2px 18px 18px; }
        .action-btn { background-color: #F8F9FA; border: 1px solid #E9ECEF; transition: all 0.2s; }
        .action-btn:hover { background-color: #E9ECEF; transform: translateY(-1px); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="bg-slate-800 text-white p-4 text-center font-bold shadow-md">
        企業內部 AI 服務入口 (Demo Mode)
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6">
        <div class="flex justify-start">
            <div class="msg-ai p-4 max-w-[85%] shadow-sm text-gray-800">
                您好，我是您的 AI 助理 🤖<br>您可以詢問關於：<b>出差、請假、報銷</b> 的規定。
            </div>
        </div>
    </div>

    <div class="bg-white p-4 border-t flex flex-col gap-2">
        <div class="flex gap-2">
            <input id="user-input" type="text" class="flex-1 bg-gray-100 border-none rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="試試輸入：我要出差...">
            <button onclick="processMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold hover:bg-blue-700">傳送</button>
        </div>
        <p class="text-xs text-gray-400 text-center">模擬使用者：王大明 (工號: ST123)</p>
    </div>

    <script>
        // 修改使用者資料，加入部門
      // 修改使用者資料，加入部門
        const userData = { name: "王大明", dept: "業務部", id: "ST123" };

        const knowledgeBase = {
            "出差": {
                answer: "✈️ <b>關於出差申請：</b><br>國內出差需於 3 天前提出申請。住宿補助 2,500 元。",
                links: [
                    { 
                        label: "📍 填寫出差申請單", 
                        // 指向剛才建立的 form.html，並帶入參數
                        url: `form2.html?type=出差&name=${userData.name}&dept=${userData.dept}&id=${userData.id}` 
                    }
                ]
            },
            "請假": {
                answer: "📅 <b>關於請假規定：</b><br>特休請假需於 1 天前完成簽核。",
                links: [
                    { 
                        label: "📝 進入請假系統", 
                        url: `form2.html?type=請假&name=${userData.name}&dept=${userData.dept}&id=${userData.id}` 
                    }
                ]
            }
        };
        function addMessage(text, isUser = false, links = []) {
            const chatContainer = document.getElementById('chat-container');
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
            
            let html = `<div class="${isUser ? 'msg-user' : 'msg-ai'} p-4 max-w-[85%] shadow-sm text-gray-800">${text}`;
            
            // 如果有連結，生成按鈕
            if (links.length > 0) {
                html += `<div class="mt-4 pt-3 border-t border-gray-100 flex flex-col gap-2">`;
                links.forEach(link => {
                    html += `<a href="${link.url}" target="_blank" class="action-btn block w-full py-2 px-3 rounded-lg text-blue-600 text-sm font-bold text-center">
                                ${link.label}
                             </a>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            
            wrapper.innerHTML = html;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function processMessage() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            if (!query) return;

            // 1. 顯示使用者輸入
            addMessage(query, true);
            input.value = "";

            // 2. 模擬 AI 思考延遲
            setTimeout(() => {
                let found = false;
                for (let key in knowledgeBase) {
                    if (query.includes(key)) {
                        addMessage(knowledgeBase[key].answer, false, knowledgeBase[key].links);
                        found = true;
                        break;
                    }
                }
                
                if (!found) {
                    addMessage("抱歉，我目前只理解「出差、請假、報銷」相關問題。建議您輸入關鍵字試試看！", false);
                }
            }, 800);
        }

        // 支援 Enter 鍵傳送
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') processMessage();
        });
    </script>
</body>
</html>
