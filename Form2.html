<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>企業內部申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h2 id="form-title" class="text-2xl font-bold mb-6 text-blue-700 border-b pb-2">載入中...</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">姓名</label>
                <input type="text" id="name" class="mt-1 block w-full border bg-gray-50 rounded-md p-2" readonly>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">部門</label>
                <input type="text" id="dept" class="mt-1 block w-full border bg-gray-50 rounded-md p-2" readonly>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">員工編號</label>
                <input type="text" id="id" class="mt-1 block w-full border bg-gray-50 rounded-md p-2" readonly>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">申請日期</label>
                <input type="text" id="date" class="mt-1 block w-full border rounded-md p-2" value="2026-04-04">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">備註原因</label>
                <textarea class="mt-1 block w-full border rounded-md p-2" rows="3" placeholder="請輸入細節..."></textarea>
            </div>
            <button onclick="alert('申請已送出！')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">確認送出</button>
        </div>
    </div>

    <script>
        // 解析網址參數 (?name=...&dept=...)
        const params = new URLSearchParams(window.location.search);
        document.getElementById('name').value = params.get('name') || "";
        document.getElementById('dept').value = params.get('dept') || "";
        document.getElementById('id').value = params.get('id') || "";
        
        // 根據類型更換標題
        const type = params.get('type') || "通用申請";
        document.getElementById('form-title').innerText = type + "申請單";
    </script>
</body>
</html>
